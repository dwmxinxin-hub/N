name: Build EXE with Pake

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Pake
        run: npm install -g pake-cli

      - name: Check Pake Version
        run: pake --version

      - name: Build EXE
        shell: cmd
        run: |
          pake ./jisuanqi.html ^
            --name "交易计算器" ^
            --use-local-file ^
            --width 1280 ^
            --height 800 ^
            --keep-binary

      - name: List Files
        shell: cmd
        run: dir

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 交易计算器-EXE
          path: .
